name: Skill Request
description: Request a new Kamal skill
title: "Skill Request: [skill-name]"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new skill! Please fill out the details below. Every skill must be grounded in the official [Kamal documentation](https://kamal-deploy.org) — link the relevant docs where you can.

  - type: input
    id: skill-name
    attributes:
      label: Suggested skill name
      description: Lowercase, hyphens only (e.g., "deploy-notifications")
      placeholder: "my-skill-name"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What should this skill do?
      description: Describe the skill's purpose and capabilities
      placeholder: "This skill should help with..."
    validations:
      required: true

  - type: textarea
    id: triggers
    attributes:
      label: When should it be used?
      description: What trigger phrases or scenarios should activate this skill?
      placeholder: |
        - When the user says "..."
        - When working on...
    validations:
      required: true

  - type: textarea
    id: docs
    attributes:
      label: Kamal docs reference
      description: Which official Kamal docs (kamal-deploy.org) ground this skill? Link the pages/sections.
      placeholder: |
        - https://kamal-deploy.org/docs/...
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Example use cases
      description: Provide 1-3 specific examples of how you'd use this skill
      placeholder: |
        1. I want to...
        2. Help me...
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which category does this skill fit into?
      options:
        - Getting Started
        - Deploying & Building
        - Configuration
        - Secrets
        - Operations
        - Upgrading
        - Other
    validations:
      required: true

  - type: textarea
    id: related-skills
    attributes:
      label: Related existing skills
      description: Are there existing skills this relates to or differs from?
      placeholder: "Similar to deploying but focused on..."
    validations:
      required: false
